v<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNO Music Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --card: #1a1a2e;
    --accent1: #ff3cac;
    --accent2: #784ba0;
    --accent3: #2b86c5;
    --gold: #ffd700;
    --text: #f0f0f8;
    --muted: #888;
    --border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* animated bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,60,172,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(43,134,197,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
    opacity: 0.4;
  }

  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 2.5rem 1rem 1rem;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.4rem, 7vw, 4.5rem);
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--accent1), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 0.4rem;
  }

  .grid {
    position: relative; z-index: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
    max-width: 1100px;
    margin: 1.5rem auto;
    padding: 0 1rem;
  }

  .slot-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.3s;
  }
  .slot-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.75rem 1rem;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }

  .card-icon { font-size: 1.2rem; }

  .card-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }

  .lock-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.25rem 0.5rem;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }
  .lock-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .lock-btn.locked { border-color: var(--gold); color: var(--gold); }

  .slot-window {
    height: 64px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .slot-window::before,
  .slot-window::after {
    content: '';
    position: absolute;
    left: 0; right: 0; height: 18px;
    z-index: 2; pointer-events: none;
  }
  .slot-window::before {
    top: 0;
    background: linear-gradient(to bottom, var(--card), transparent);
  }
  .slot-window::after {
    bottom: 0;
    background: linear-gradient(to top, var(--card), transparent);
  }

  .slot-track {
    display: flex;
    flex-direction: column;
    transition: transform 0.0s;
  }
  .slot-track.spinning {
    transition: transform 0.05s linear;
  }

  .slot-item {
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 1rem;
    font-size: 1.05rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .slot-item.active {
    color: #fff;
  }

  .card-footer {
    padding: 0.5rem 1rem;
    min-height: 32px;
    font-size: 0.62rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    line-height: 1.4;
  }

  /* CENTER SPIN BUTTON */
  .spin-area {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1rem 1.5rem;
  }

  .spin-btn {
    position: relative;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    border: none;
    border-radius: 50px;
    color: #fff;
    cursor: pointer;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    padding: 1rem 3.5rem;
    transition: transform 0.15s, box-shadow 0.3s;
    box-shadow: 0 0 30px rgba(255,60,172,0.3), 0 0 60px rgba(43,134,197,0.15);
  }
  .spin-btn:hover {
    transform: scale(1.04);
    box-shadow: 0 0 40px rgba(255,60,172,0.5), 0 0 80px rgba(43,134,197,0.25);
  }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* PROMPT OUTPUT */
  .prompt-box {
    position: relative; z-index: 1;
    max-width: 760px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
  }

  .prompt-inner {
    background: var(--surface);
    border: 1px solid rgba(255,60,172,0.25);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    position: relative;
    min-height: 80px;
  }

  .prompt-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 0.6rem;
  }

  .prompt-text {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
  }

  .prompt-text.empty { color: var(--muted); font-style: italic; }

  .copy-btn {
    position: absolute;
    top: 0.75rem; right: 0.75rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.3rem 0.6rem;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .copy-btn.copied { border-color: #4caf50; color: #4caf50; }

  /* accent bar */
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: linear-gradient(to bottom, var(--accent1), var(--accent3));
  }

  /* spinning animation */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,60,172,0.2); }
    50%       { box-shadow: 0 0 40px rgba(255,60,172,0.6); }
  }
  .slot-card.spinning-card {
    animation: glow-pulse 0.3s ease-in-out infinite;
  }

  /* history chips */
  .history-area {
    position: relative; z-index: 1;
    max-width: 760px;
    margin: 0 auto 3rem;
    padding: 0 1rem;
  }
  .history-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.7rem;
    font-size: 0.62rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent1); color: var(--text); }

  .divider { height: 1px; background: var(--border); max-width: 760px; margin: 0 auto 1rem; }

  /* EDIT MODE */
  .card-header .edit-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0.25rem 0.45rem;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
    margin-right: 0.3rem;
  }
  .card-header .edit-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .card-header .edit-btn.active { border-color: var(--accent1); color: var(--accent1); }

  .edit-panel {
    display: none;
    padding: 0.6rem 1rem;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid var(--border);
  }
  .edit-panel.open { display: block; }

  .edit-input-row {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
  }

  .edit-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 0.4rem 0.6rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .edit-input:focus { border-color: var(--accent1); }
  .edit-input::placeholder { color: var(--muted); }

  .edit-set-btn {
    background: var(--accent1);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.4rem 0.7rem;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .edit-set-btn:hover { opacity: 0.85; }

  .edit-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .preset-chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.6rem;
    padding: 0.2rem 0.55rem;
    transition: all 0.15s;
    font-family: 'Space Mono', monospace;
  }
  .preset-chip:hover { background: rgba(255,255,255,0.09); color: var(--text); border-color: rgba(255,255,255,0.25); }
  .preset-chip.selected { border-color: var(--accent1); color: var(--accent1); background: rgba(255,60,172,0.08); }
</style>
</head>
<body>
<div class="noise"></div>

<header>
  <div class="logo">🎵 SUNO ROULETTE</div>
  <div class="tagline">Spin to generate your next track prompt</div>

</div>

<div class="prompt-box">
  <div class="prompt-inner">
    <div class="accent-bar"></div>
    <div class="prompt-label">▶ SUNO PROMPT</div>

    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()" style="display:none">COPY</button>
  </div>
</div>

<div class="history-area" id="historyArea" style="display:none">

</div>

      'Androgynous / Gender-neutral',
      'Child Voice (子供の声)',
      'Duet (男女ハーモニー)',
      'Group Chorus (合唱)',
      'Rap / MC (語り・フロウ)',
      'Whisper (囁き)',
      'Falsetto (裏声)',
      'Raspy / Husky (しゃがれ声)',
      'Breathy & Airy (息漏れ)',
      'Operatic (オペラ風)',
      'Vocoder / Robot Voice',
      'Auto-Tune Heavy (T-Pain風)',
      'Harmonized Stack (多重録音)',
      'No Vocal (インスト)',
      'Spoken Word (語り)'
    ],
    color: '#ab47bc'
  }
];

let locked = {};
let current = {};
let history = [];
let isSpinning = false;

function buildUI() {
  const grid = document.getElementById('slotGrid');
  grid.innerHTML = '';
  SLOTS.forEach(slot => {
    const card = document.createElement('div');
    card.className = 'slot-card';
    card.id = `card-${slot.key}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-icon">${slot.icon}</span>
        <span class="card-label">${slot.label}</span>
        <button class="edit-btn" id="editbtn-${slot.key}" onclick="toggleEdit('${slot.key}')">✏️ EDIT</button>
        <button class="lock-btn" id="lock-${slot.key}" onclick="toggleLock('${slot.key}')">🔒 LOCK</button>
      </div>
      <div class="slot-window" onclick="spinSingle('${slot.key}')">
        <div class="slot-track" id="track-${slot.key}">
          <div class="slot-item active" id="item-${slot.key}" style="color:${slot.color}">—</div>
        </div>
      </div>
      <div class="edit-panel" id="editpanel-${slot.key}">
        <div class="edit-input-row">
          <input class="edit-input" id="editinput-${slot.key}" type="text" placeholder="カスタム入力..." onkeydown="if(event.key==='Enter') applyEdit('${slot.key}')">
          <button class="edit-set-btn" onclick="applyEdit('${slot.key}')">SET</button>
        </div>
        <div class="edit-presets" id="presets-${slot.key}"></div>
      </div>
      <div class="card-footer" id="hint-${slot.key}">${slot.hint}</div>
    `;
    grid.appendChild(card);

    // render preset chips
    setTimeout(() => {
      const presetContainer = document.getElementById(`presets-${slot.key}`);
      if (presetContainer) {
        presetContainer.innerHTML = slot.items.map(item =>
          `<span class="preset-chip" onclick="selectPreset('${slot.key}', this, '${item.replace(/'/g,"&#39;")}')">${item}</span>`
        ).join('');
      }
    }, 0);
  });
}

function toggleEdit(key) {
  const panel = document.getElementById(`editpanel-${key}`);
  const btn = document.getElementById(`editbtn-${key}`);
  const isOpen = panel.classList.contains('open');
  // close all panels first
  document.querySelectorAll('.edit-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.edit-btn').forEach(b => b.classList.remove('active'));
  if (!isOpen) {
    panel.classList.add('open');
    btn.classList.add('active');
    // highlight current value
    const cur = current[key];
    if (cur) {
      document.getElementById(`editinput-${key}`).value = cur;
      document.querySelectorAll(`#presets-${key} .preset-chip`).forEach(c => {
        c.classList.toggle('selected', c.textContent === cur);
      });
    }
    document.getElementById(`editinput-${key}`).focus();
  }
}

function selectPreset(key, el, value) {
  document.querySelectorAll(`#presets-${key} .preset-chip`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(`editinput-${key}`).value = value;
  applyEdit(key);
}

function applyEdit(key) {
  const input = document.getElementById(`editinput-${key}`);
  const val = input.value.trim();
  if (!val) return;
  const slot = SLOTS.find(s => s.key === key);
  const track = document.getElementById(`track-${key}`);
  track.innerHTML = `<div class="slot-item active" style="color:${slot.color}">${val}</div>`;
  current[key] = val;
  // auto-lock when manually set
  if (!locked[key]) toggleLock(key);
  buildPrompt();
}

function getRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function animateSlot(key, finalValue, duration, onDone) {
  const slot = SLOTS.find(s => s.key === key);
  const track = document.getElementById(`track-${key}`);
  const card = document.getElementById(`card-${key}`);

  card.classList.add('spinning-card');

  let elapsed = 0;
  const interval = 60;
  const timer = setInterval(() => {
    elapsed += interval;
    const fake = getRandom(slot.items);
    track.innerHTML = `<div class="slot-item active" style="color:${slot.color};opacity:0.7">${fake}</div>`;
    if (elapsed >= duration) {
      clearInterval(timer);
      card.classList.remove('spinning-card');
      track.innerHTML = `<div class="slot-item active" style="color:${slot.color}">${finalValue}</div>`;
      current[key] = finalValue;
      if (onDone) onDone();
    }
  }, interval);
}

function spinSingle(key) {
  if (isSpinning || locked[key]) return;
  const slot = SLOTS.find(s => s.key === key);
  const val = getRandom(slot.items);
  animateSlot(key, val, 400, () => buildPrompt());
}

async function spinAll() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;

  const toSpin = SLOTS.filter(s => !locked[s.key]);
  const finals = {};
  toSpin.forEach(s => { finals[s.key] = getRandom(s.items); });

  let done = 0;
  toSpin.forEach((slot, i) => {
    const delay = i * 80;
    const dur = 500 + Math.random() * 400;
    setTimeout(() => {
      animateSlot(slot.key, finals[slot.key], dur, () => {
        done++;
        if (done === toSpin.length) {
          isSpinning = false;
          document.getElementById('spinBtn').disabled = false;
          buildPrompt();
        }
      });
    }, delay);
  });

  if (toSpin.length === 0) {
    isSpinning = false;
    document.getElementById('spinBtn').disabled = false;
  }
}

function buildPrompt() {
  const allFilled = SLOTS.every(s => current[s.key]);
  if (!allFilled) return;

  const { genre, mood, tempo, instrument, rhythm, bass, chord, sub_instrument, theme, era, progression, modulation, groove, vocal } = current;
  const prompt = `${genre} track, ${mood.toLowerCase()} atmosphere, ${tempo}, groove: ${groove}, chord progression: ${progression}, modulation: ${modulation}, vocal: ${vocal}, lead: ${instrument}, rhythm: ${rhythm}, bass: ${bass}, chords: ${chord}, fx: ${sub_instrument}, theme: "${theme}", ${era} sound aesthetic`;

  document.getElementById('promptText').textContent = prompt;
  document.getElementById('promptText').classList.remove('empty');
  document.getElementById('copyBtn').style.display = 'block';

  // add to history
  history.unshift(prompt);
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) return;
  const area = document.getElementById('historyArea');
  area.style.display = 'block';
  const container = document.getElementById('chipsContainer');
  container.innerHTML = history.map((p, i) =>
    `<div class="chip" title="${p}" onclick="restorePrompt(${i})">${p}</div>`
  ).join('');
}

function restorePrompt(i) {
  document.getElementById('promptText').textContent = history[i];
  document.getElementById('promptText').classList.remove('empty');
  document.getElementById('copyBtn').style.display = 'block';
}

function toggleLock(key) {
  locked[key] = !locked[key];
  const btn = document.getElementById(`lock-${key}`);
  const card = document.getElementById(`card-${key}`);
  if (locked[key]) {
    btn.classList.add('locked');
    btn.textContent = '🔒 LOCKED';
    card.style.borderColor = 'rgba(255,215,0,0.3)';
  } else {
    btn.classList.remove('locked');
    btn.textContent = '🔒 LOCK';
    card.style.borderColor = '';
  }
}

function copyPrompt() {
  const text = document.getElementById('promptText').textContent;
  const btn = document.getElementById('copyBtn');

  function onSuccess() {
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 1500);
  }

  function onFail() {
    // select the text visually as last resort
    const el = document.getElementById('promptText');
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    btn.textContent = '📋 SELECT';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPY';
      btn.classList.remove('copied');
    }, 2000);
  }

  // Try modern clipboard API first
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
      // fallback: execCommand
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        onSuccess();
      } catch(e) { onFail(); }
    });
  } else {
    // execCommand fallback (older browsers / iframe)
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      onSuccess();
    } catch(e) { onFail(); }
  }
}

// init
buildUI();

// pre-spin one round on load
setTimeout(() => {
  SLOTS.forEach(slot => {
    const val = getRandom(slot.items);
    current[slot.key] = val;
    const track = document.getElementById(`track-${slot.key}`);
    track.innerHTML = `<div class="slot-item active" style="color:${slot.color}">${val}</div>`;
  });
  buildPrompt();
}, 200);
</script>
